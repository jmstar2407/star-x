<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Guardados Instagram</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

h1{
margin-bottom:20px;
}

.inputBox{
display:flex;
gap:10px;
margin-bottom:30px;
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:.9;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card{

background:#1e293b;
border-radius:12px;
overflow:hidden;
position:relative;

transition:.3s;
}

.card:hover{
transform:translateY(-4px);
}

.card img{
width:100%;
height:280px;
object-fit:cover;
}

.actions{

position:absolute;
bottom:10px;
left:10px;
right:10px;

display:flex;
gap:10px;
}

.actions button{

flex:1;
font-size:12px;
padding:8px;
border-radius:6px;
}

.open{
background:#22c55e;
}

.delete{
background:#ef4444;
}

</style>

</head>

<body>

<h1>Guardados de Instagram</h1>

<div class="inputBox">
<input id="url" placeholder="Pega un reel o post de Instagram">
<button onclick="guardar()">Guardar</button>
</div>

<div class="grid" id="grid"></div>

<script>

const firebaseConfig = {

  apiKey: "AIzaSyD4r7z-ysFQEKMiZaYWShiA_w8k81vJ5Dg",
  authDomain: "star-x-d2c5a.firebaseapp.com",
  projectId: "star-x-d2c5a",
  storageBucket: "star-x-d2c5a.firebasestorage.app",
  messagingSenderId: "933631576228",
  appId: "1:933631576228:web:a27ac7bdd89703af7afe31",
  measurementId: "G-C4TC5LJHVG"

};

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()

function obtenerThumbnail(url){

return `https://api.microlink.io/?url=${encodeURIComponent(url)}&screenshot=true&meta=false&embed=screenshot.url`

}

async function guardar(){

let url=document.getElementById("url").value

if(!url) return

let thumb=obtenerThumbnail(url)

await db.collection("posts").add({

url:url,
thumbnail:thumb,
created:Date.now()

})

document.getElementById("url").value=""

cargar()

}

async function eliminar(id){

await db.collection("posts").doc(id).delete()

cargar()

}

function abrir(url){

window.open(url,"_blank")

}

async function cargar(){

let grid=document.getElementById("grid")

grid.innerHTML=""

let snapshot=await db.collection("posts").orderBy("created","desc").get()

snapshot.forEach(doc=>{

let data=doc.data()

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="${data.thumbnail}">

<div class="actions">

<button class="open" onclick="abrir('${data.url}')">
Abrir
</button>

<button class="delete" onclick="eliminar('${doc.id}')">
Eliminar
</button>

</div>

`

grid.appendChild(card)

})

}

cargar()

</script>

</body>

</html>
