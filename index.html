<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#080810" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>InVault — Tu archivo privado</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js';
    import {
      getFirestore, collection, addDoc, getDocs,
      deleteDoc, doc, updateDoc, query, orderBy, onSnapshot
    } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js';

    // ══════════════════════════════════════════
    // 🔥 FIREBASE CONFIG — Reemplaza con los tuyos
    // ══════════════════════════════════════════
    const firebaseConfig = {
  apiKey: "AIzaSyD4r7z-ysFQEKMiZaYWShiA_w8k81vJ5Dg",
  authDomain: "star-x-d2c5a.firebaseapp.com",
  projectId: "star-x-d2c5a",
  storageBucket: "star-x-d2c5a.firebasestorage.app",
  messagingSenderId: "933631576228",
  appId: "1:933631576228:web:a27ac7bdd89703af7afe31",
  measurementId: "G-C4TC5LJHVG"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // Expose to global scope for app.js
    window.__firebase = { db, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, orderBy, onSnapshot };
    window.dispatchEvent(new Event('firebase-ready'));
  </script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ══════════════════════════════════════════
     PIN SCREEN
══════════════════════════════════════════ -->
<div id="pin-screen" class="screen active">
  <div class="noise"></div>
  <div class="pin-glow g1"></div>
  <div class="pin-glow g2"></div>
  <div class="pin-glow g3"></div>

  <div class="pin-wrap">
    <div class="brand">
      <div class="brand-mark">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path d="M14 3 C8 3 3 8 3 14 C3 20 8 25 14 25 C20 25 25 20 25 14" stroke="url(#pg)" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="14" cy="14" r="3.5" fill="url(#pg2)"/>
          <circle cx="22" cy="6" r="1.5" fill="url(#pg2)"/>
          <defs>
            <linearGradient id="pg" x1="3" y1="3" x2="25" y2="25">
              <stop offset="0%" stop-color="#f09433"/>
              <stop offset="50%" stop-color="#dc2743"/>
              <stop offset="100%" stop-color="#bc1888"/>
            </linearGradient>
            <linearGradient id="pg2" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#f09433"/>
              <stop offset="100%" stop-color="#bc1888"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <span class="brand-name">InVault</span>
    </div>

    <p class="pin-hint">Introduce tu PIN</p>

    <div class="pin-display" id="pin-display">
      <div class="pin-cell" id="pc0"></div>
      <div class="pin-cell" id="pc1"></div>
      <div class="pin-cell" id="pc2"></div>
      <div class="pin-cell" id="pc3"></div>
      <div class="pin-cell" id="pc4"></div>
    </div>

    <div class="pin-shake-msg" id="pin-error">PIN incorrecto</div>

    <div class="keypad">
      <button class="key" data-n="1"><span>1</span></button>
      <button class="key" data-n="2"><span>2</span></button>
      <button class="key" data-n="3"><span>3</span></button>
      <button class="key" data-n="4"><span>4</span></button>
      <button class="key" data-n="5"><span>5</span></button>
      <button class="key" data-n="6"><span>6</span></button>
      <button class="key" data-n="7"><span>7</span></button>
      <button class="key" data-n="8"><span>8</span></button>
      <button class="key" data-n="9"><span>9</span></button>
      <button class="key key-ghost"></button>
      <button class="key" data-n="0"><span>0</span></button>
      <button class="key key-del" id="key-del">
        <svg width="18" height="14" viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M6 1H17V13H6L1 7Z"/>
          <line x1="10" y1="4.5" x2="13.5" y2="8"/>
          <line x1="13.5" y1="4.5" x2="10" y2="8"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     APP SCREEN
══════════════════════════════════════════ -->
<div id="app-screen" class="screen">

  <!-- Sidebar / Nav (web layout) -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark sm">
        <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
          <path d="M14 3 C8 3 3 8 3 14 C3 20 8 25 14 25 C20 25 25 20 25 14" stroke="url(#sg)" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="14" cy="14" r="3.5" fill="url(#sg2)"/>
          <circle cx="22" cy="6" r="1.5" fill="url(#sg2)"/>
          <defs>
            <linearGradient id="sg" x1="3" y1="3" x2="25" y2="25">
              <stop offset="0%" stop-color="#f09433"/>
              <stop offset="100%" stop-color="#bc1888"/>
            </linearGradient>
            <linearGradient id="sg2" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#f09433"/>
              <stop offset="100%" stop-color="#bc1888"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <span>InVault</span>
    </div>

    <div class="sidebar-filters">
      <div class="sidebar-label">Colección</div>
      <button class="nav-item active" data-filter="all">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Todos
        <span class="nav-count" id="count-all">0</span>
      </button>
      <button class="nav-item" data-filter="post">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="4"/></svg>
        Posts
        <span class="nav-count" id="count-post">0</span>
      </button>
      <button class="nav-item" data-filter="reel">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Reels
        <span class="nav-count" id="count-reel">0</span>
      </button>
      <button class="nav-item" data-filter="story">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/></svg>
        Stories
        <span class="nav-count" id="count-story">0</span>
      </button>
    </div>

    <div class="sidebar-bottom">
      <button class="nav-item" id="sidebar-lock">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Bloquear
      </button>
    </div>
  </nav>

  <!-- Main content -->
  <div class="main-area">

    <!-- Top bar -->
    <header class="topbar">
      <button class="topbar-menu" id="menu-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>

      <div class="topbar-search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Buscar posts, notas, etiquetas…" />
      </div>

      <button class="topbar-add" id="topbar-add-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>Guardar post</span>
      </button>
    </header>

    <!-- Filter pills (mobile) -->
    <div class="filter-pills" id="filter-pills">
      <button class="pill active" data-filter="all">Todos</button>
      <button class="pill" data-filter="post">Posts</button>
      <button class="pill" data-filter="reel">Reels</button>
      <button class="pill" data-filter="story">Stories</button>
    </div>

    <!-- Feed -->
    <main class="feed" id="feed">

      <!-- Loading state -->
      <div class="loading-state" id="loading-state">
        <div class="spinner"></div>
        <span>Conectando con Firebase…</span>
      </div>

      <!-- Empty state -->
      <div class="empty-state hidden" id="empty-state">
        <div class="empty-visual">
          <div class="empty-ring"></div>
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="18.5" cy="5.5" r="1"/></svg>
        </div>
        <h3>Nada guardado aún</h3>
        <p>Pega un enlace de Instagram para comenzar tu colección</p>
        <button class="btn-ig" id="empty-add-btn">
          Guardar primer post
        </button>
      </div>

      <!-- Posts grid -->
      <div class="posts-masonry" id="posts-grid"></div>
    </main>
  </div>
</div>

<!-- ══════════════════════════════════════════
     MODAL: GUARDAR POST
══════════════════════════════════════════ -->
<div class="modal-overlay hidden" id="add-modal-overlay">
  <div class="modal-sheet" id="add-modal">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 class="sheet-title">Guardar post</h2>
      <button class="sheet-close" id="add-modal-close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="sheet-body">
      <div class="input-group">
        <label>Enlace de Instagram <span class="req">*</span></label>
        <div class="url-input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          <input type="url" id="add-url" placeholder="https://www.instagram.com/p/…" autocomplete="off" />
          <button class="paste-btn" id="paste-btn" title="Pegar del portapapeles">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
        <div class="url-preview hidden" id="url-preview"></div>
      </div>

      <div class="input-group">
        <label>Tipo</label>
        <div class="type-grid">
          <label class="type-card">
            <input type="radio" name="post-type" value="post" checked>
            <span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="4"/></svg>
              Post
            </span>
          </label>
          <label class="type-card">
            <input type="radio" name="post-type" value="reel">
            <span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Reel
            </span>
          </label>
          <label class="type-card">
            <input type="radio" name="post-type" value="story">
            <span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/></svg>
              Story
            </span>
          </label>
          <label class="type-card">
            <input type="radio" name="post-type" value="profile">
            <span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              Perfil
            </span>
          </label>
        </div>
      </div>

      <div class="input-group">
        <label>Nota personal <span class="opt">(opcional)</span></label>
        <textarea id="add-note" rows="3" placeholder="¿Por qué guardas este post? ¿Qué te gustó?"></textarea>
      </div>

      <div class="input-group">
        <label>Etiquetas <span class="opt">(opcional)</span></label>
        <input type="text" id="add-tags" placeholder="moda, recetas, viajes — separadas por coma" />
      </div>
    </div>

    <div class="sheet-footer">
      <button class="btn-outline" id="add-cancel">Cancelar</button>
      <button class="btn-ig" id="add-save">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
        Guardar
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     MODAL: DETALLE DEL POST (con embed)
══════════════════════════════════════════ -->
<div class="modal-overlay hidden" id="detail-modal-overlay">
  <div class="modal-sheet modal-detail" id="detail-modal">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="detail-badge" id="detail-badge">Post</div>
      <div class="detail-header-actions">
        <button class="icon-action" id="detail-copy-btn" title="Copiar enlace">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
        <button class="icon-action" id="detail-open-btn" title="Abrir en Instagram">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </button>
        <button class="icon-action danger" id="detail-delete-btn" title="Eliminar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
        <button class="sheet-close" id="detail-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <div class="sheet-body detail-body">
      <!-- Instagram embed will go here -->
      <div class="embed-container" id="embed-container">
        <div class="embed-fallback">
          <div class="spinner sm"></div>
        </div>
      </div>

      <!-- Meta info -->
      <div class="detail-meta">
        <div class="meta-row">
          <span class="meta-label">Enlace</span>
          <a class="meta-url" id="detail-url" href="#" target="_blank"></a>
        </div>
        <div class="meta-row">
          <span class="meta-label">Guardado</span>
          <span class="meta-val" id="detail-date"></span>
        </div>
      </div>

      <!-- Note (editable) -->
      <div class="detail-note-section">
        <label class="section-label">Nota personal</label>
        <textarea class="detail-textarea" id="detail-note" placeholder="Añade una nota sobre este post…"></textarea>
      </div>

      <!-- Tags (editable) -->
      <div class="detail-tags-section">
        <label class="section-label">Etiquetas</label>
        <div class="tags-editor">
          <div class="tags-chips" id="detail-tags-chips"></div>
          <div class="tag-add-row">
            <input type="text" id="detail-tag-input" placeholder="Nueva etiqueta…" />
            <button class="tag-add-btn" id="detail-tag-add">+</button>
          </div>
        </div>
      </div>
    </div>

    <div class="sheet-footer">
      <button class="btn-outline" id="detail-cancel">Cerrar sin guardar</button>
      <button class="btn-ig" id="detail-save">Guardar cambios</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast hidden" id="toast"></div>

<!-- Mobile FAB -->
<button class="fab" id="fab">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- Instagram embed.js — processes blockquotes as fallback -->
<script async defer src="https://www.instagram.com/embed.js" id="ig-embed-script"></script>
<script src="app.js"></script>
</body>
</html>
